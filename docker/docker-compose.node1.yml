services:
  prometheus:
    image: prom/prometheus:v3.5.1
    restart: unless-stopped
    ports:
      - "${AI_CAMERA_OBSERVABILITY_BIND:-127.0.0.1}:9090:9090"
    volumes:
      - ../configs/runtime/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_storage:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=${AI_CAMERA_PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    ports:
      - "${AI_CAMERA_OBSERVABILITY_BIND:-127.0.0.1}:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_DOMAIN: ${AI_CAMERA_NODE1_IP:-127.0.0.1}
      GF_SERVER_ROOT_URL: http://${AI_CAMERA_NODE1_IP:-127.0.0.1}:3000/
      GF_SECURITY_ALLOW_EMBEDDING: ${GF_SECURITY_ALLOW_EMBEDDING:-false}
      GF_AUTH_ANONYMOUS_ENABLED: ${GF_AUTH_ANONYMOUS_ENABLED:-false}
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana_storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  qdrant:
    image: qdrant/qdrant:v1.16.3
    restart: unless-stopped
    ports:
      - "${AI_CAMERA_OBSERVABILITY_BIND:-127.0.0.1}:6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  prometheus_storage:
  grafana_storage:
  qdrant_storage:
